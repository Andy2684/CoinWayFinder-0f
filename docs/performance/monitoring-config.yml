# Security System Performance Monitoring Configuration

monitoring:
  name: "Coinwayfinder Security System"
  version: "1.0.0"
  
  # Performance Thresholds
  thresholds:
    response_time:
      warning: 100  # milliseconds
      critical: 200
      target: 50
    
    throughput:
      warning: 35   # events per second
      critical: 25
      target: 40
    
    error_rate:
      warning: 0.1  # percentage
      critical: 1.0
      target: 0.0
    
    memory_usage:
      warning: 200  # MB
      critical: 400
      target: 150
    
    concurrency:
      warning: 40   # concurrent events
      critical: 75
      target: 25

  # Metrics Collection
  metrics:
    collection_interval: 30  # seconds
    retention_period: 30     # days
    
    response_time:
      enabled: true
      percentiles: [50, 90, 95, 99, 99.9]
      histogram_buckets: [10, 25, 50, 100, 200, 500, 1000]
    
    throughput:
      enabled: true
      window_size: 60  # seconds
      aggregation: "rate"
    
    error_tracking:
      enabled: true
      categorize_by: ["type", "source", "severity"]
      sample_rate: 1.0
    
    memory_monitoring:
      enabled: true
      track_growth: true
      leak_detection: true
      gc_monitoring: true
    
    database_metrics:
      enabled: true
      connection_pool: true
      query_performance: true
      operation_timing: true

  # Alerting Rules
  alerts:
    high_response_time:
      condition: "p95_response_time > 100"
      duration: "2m"
      severity: "warning"
      message: "High response times detected"
    
    critical_response_time:
      condition: "p95_response_time > 200"
      duration: "1m"
      severity: "critical"
      message: "Critical response times detected"
    
    low_throughput:
      condition: "throughput < 35"
      duration: "5m"
      severity: "warning"
      message: "Low throughput detected"
    
    error_spike:
      condition: "error_rate > 0.1"
      duration: "1m"
      severity: "critical"
      message: "Error rate spike detected"
    
    memory_leak:
      condition: "memory_growth > 10MB/hour"
      duration: "10m"
      severity: "warning"
      message: "Potential memory leak detected"
    
    database_issues:
      condition: "db_connection_errors > 0"
      duration: "30s"
      severity: "critical"
      message: "Database connection issues"

  # Dashboard Configuration
  dashboards:
    overview:
      refresh_interval: 30
      panels:
        - type: "graph"
          title: "Response Time Percentiles"
          metrics: ["p50", "p95", "p99"]
          timeframe: "1h"
        
        - type: "single_stat"
          title: "Current Throughput"
          metric: "throughput"
          unit: "events/sec"
        
        - type: "single_stat"
          title: "Error Rate"
          metric: "error_rate"
          unit: "percent"
        
        - type: "graph"
          title: "Memory Usage"
          metrics: ["heap_used", "heap_total", "rss"]
          timeframe: "6h"
    
    security_events:
      refresh_interval: 15
      panels:
        - type: "table"
          title: "Recent Security Events"
          limit: 50
          columns: ["timestamp", "type", "severity", "source", "ip"]
        
        - type: "pie_chart"
          title: "Event Types Distribution"
          metric: "event_type_count"
          timeframe: "1h"
        
        - type: "heatmap"
          title: "Event Severity Over Time"
          x_axis: "time"
          y_axis: "severity"
          timeframe: "24h"

  # Health Checks
  health_checks:
    system_health:
      endpoint: "/api/health"
      interval: 30
      timeout: 5
      expected_status: 200
    
    database_health:
      type: "redis_ping"
      interval: 60
      timeout: 3
    
    security_monitor:
      type: "custom"
      script: "check_security_monitor.js"
      interval: 120
      timeout: 10

  # Performance Baselines
  baselines:
    response_time:
      p50: 42
      p95: 78
      p99: 95
    
    throughput:
      sustained: 49.9
      burst: 75
      recommended: 40
    
    memory:
      baseline: 90
      per_event_cost: 0.009
      growth_rate: "linear"
    
    concurrency:
      tested_max: 25
      estimated_max: 100
      recommended: 50

  # Notification Channels
  notifications:
    slack:
      enabled: true
      webhook_url: "${SLACK_WEBHOOK_URL}"
      channel: "#security-alerts"
      username: "Security Monitor"
    
    email:
      enabled: true
      smtp_host: "${SMTP_HOST}"
      smtp_user: "${SMTP_USER}"
      smtp_pass: "${SMTP_PASS}"
      recipients: ["security-team@coinwayfinder.com"]
    
    webhook:
      enabled: true
      url: "${SECURITY_WEBHOOK_URL}"
      headers:
        Authorization: "Bearer ${API_SECRET_KEY}"
        Content-Type: "application/json"

  # Data Retention
  retention:
    raw_metrics: "7d"
    aggregated_metrics: "30d"
    security_events: "90d"
    performance_logs: "14d"
    error_logs: "30d"

  # Export Configuration
  exports:
    prometheus:
      enabled: true
      port: 9090
      path: "/metrics"
    
    json:
      enabled: true
      endpoint: "/api/metrics"
      format: "json"
    
    csv:
      enabled: false
      schedule: "daily"
      path: "/exports/metrics"
